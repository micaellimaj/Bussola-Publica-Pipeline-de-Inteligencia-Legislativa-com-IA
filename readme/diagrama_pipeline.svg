<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 640" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6470"/>
    </marker>
    <style>
      .title{font-size:26px;font-weight:700;fill:#13294b}
      .sub{font-size:14px;fill:#5b6470}
      .stage{font-size:15px;font-weight:700;fill:#ffffff}
      .small{font-size:12px;fill:#33425b}
      .ondark{font-size:12px;fill:#ffffff}
      .tag{font-size:11px;fill:#5b6470}
      .badge{font-size:11px;font-weight:700;fill:#0a7d36}
    </style>
  </defs>

  <rect width="1180" height="640" fill="#f7f9fc"/>
  <text x="40" y="48" class="title">Bússola Pública — Pipeline de Inteligência Legislativa</text>
  <text x="40" y="72" class="sub">API Dados Abertos (Câmara) → Data Lake → ETL/Supabase → Camada de IA → Automação n8n</text>

  <!-- Stage 1 -->
  <rect x="40" y="120" width="200" height="120" rx="10" fill="#13294b"/>
  <text x="56" y="148" class="stage">1 · Extração</text>
  <text x="56" y="172" class="ondark">src/extraction.py</text>
  <text x="56" y="192" class="ondark">requests + paginação</text>
  <text x="56" y="210" class="ondark">try/except + timeout</text>
  <text x="56" y="228" class="ondark">JSON bruto → data_raw/</text>

  <!-- Stage 2 -->
  <rect x="280" y="120" width="200" height="120" rx="10" fill="#1f4e8c"/>
  <text x="296" y="148" class="stage">2 · Transformação</text>
  <text x="296" y="172" class="ondark">src/transformers.py</text>
  <text x="296" y="192" class="ondark">Pandas: limpeza,</text>
  <text x="296" y="210" class="ondark">dedup, datas, nulos</text>
  <text x="296" y="228" class="ondark">modelo estrela</text>

  <!-- Stage 3 -->
  <rect x="520" y="120" width="200" height="120" rx="10" fill="#2e7d32"/>
  <text x="536" y="148" class="stage">3 · Carga</text>
  <text x="536" y="172" class="ondark">src/transformation.py</text>
  <text x="536" y="192" class="ondark">SQLAlchemy → Supabase</text>
  <text x="536" y="210" class="ondark">Fato + Dimensão</text>
  <text x="536" y="228" class="ondark">carga incremental</text>

  <!-- Stage 4 -->
  <rect x="760" y="120" width="200" height="120" rx="10" fill="#6a1b9a"/>
  <text x="776" y="148" class="stage">4 · Camada de IA</text>
  <text x="776" y="172" class="ondark">src/ai_layer.py</text>
  <text x="776" y="192" class="ondark">B: resumo (GPT-4o-mini)</text>
  <text x="776" y="210" class="ondark">A: tema (embeddings +</text>
  <text x="776" y="228" class="ondark">cosseno) NOVO</text>

  <!-- Stage 5 -->
  <rect x="1000" y="120" width="150" height="120" rx="10" fill="#c62828"/>
  <text x="1016" y="148" class="stage">5 · Automação</text>
  <text x="1016" y="172" class="ondark">n8n · 06h</text>
  <text x="1016" y="192" class="ondark">main.py</text>
  <text x="1016" y="210" class="ondark">e-mail digest</text>
  <text x="1016" y="228" class="ondark">+ alerta falha</text>

  <!-- arrows between stages -->
  <line x1="240" y1="180" x2="278" y2="180" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="180" x2="518" y2="180" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="180" x2="758" y2="180" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="960" y1="180" x2="998" y2="180" stroke="#5b6470" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Data layers row -->
  <text x="40" y="300" class="title" font-size="18">Camadas de dados</text>

  <rect x="40" y="320" width="200" height="70" rx="8" fill="#ffffff" stroke="#cfd8e3"/>
  <text x="56" y="346" class="small" font-weight="700">🥉 Bronze</text>
  <text x="56" y="368" class="tag">data_raw/*.json (bruto)</text>

  <rect x="280" y="320" width="440" height="70" rx="8" fill="#ffffff" stroke="#cfd8e3"/>
  <text x="296" y="344" class="small" font-weight="700">🥈 Prata / 🥇 Ouro — Supabase (PostgreSQL)</text>
  <text x="296" y="363" class="tag">dim_deputados · dim_partidos · fato_proposicoes</text>
  <text x="296" y="379" class="tag">fato_proposicoes_autores · fato_votacoes · fato_votos</text>

  <rect x="760" y="320" width="390" height="70" rx="8" fill="#f3e9fb" stroke="#d3b8e8"/>
  <text x="776" y="346" class="small" font-weight="700" fill="#6a1b9a">Enriquecimento de IA em fato_proposicoes</text>
  <text x="776" y="368" class="tag" fill="#6a1b9a">resumo_executivo · data_resumo · tema · tema_score · data_tema</text>

  <!-- IA detail box -->
  <text x="40" y="440" class="title" font-size="18">Etapa 5 — Automação (n8n)</text>
  <rect x="40" y="460" width="1110" height="140" rx="10" fill="#ffffff" stroke="#cfd8e3"/>

  <rect x="64" y="500" width="150" height="56" rx="8" fill="#fdecea" stroke="#e6a9a3"/>
  <text x="139" y="525" text-anchor="middle" class="small" font-weight="700">⏰ Schedule 06h</text>
  <text x="139" y="543" text-anchor="middle" class="tag">cron 0 6 * * *</text>

  <rect x="254" y="500" width="170" height="56" rx="8" fill="#eef3fb" stroke="#a9c0e6"/>
  <text x="339" y="525" text-anchor="middle" class="small" font-weight="700">▶ Execute Command</text>
  <text x="339" y="543" text-anchor="middle" class="tag">poetry run python main.py</text>

  <rect x="464" y="500" width="120" height="56" rx="8" fill="#fff7e6" stroke="#e6c878"/>
  <text x="524" y="528" text-anchor="middle" class="small" font-weight="700">❓ Pipeline OK?</text>

  <rect x="624" y="472" width="200" height="50" rx="8" fill="#e9f5ec" stroke="#9cc9a4"/>
  <text x="724" y="494" text-anchor="middle" class="small" font-weight="700">Postgres: top 5 do dia</text>
  <text x="724" y="512" text-anchor="middle" class="tag">tema + resumo (IA)</text>

  <rect x="864" y="472" width="260" height="50" rx="8" fill="#e9f5ec" stroke="#9cc9a4"/>
  <text x="994" y="494" text-anchor="middle" class="small" font-weight="700">✉ E-mail Digest (sucesso)</text>
  <text x="994" y="512" text-anchor="middle" class="tag">radar legislativo diário</text>

  <rect x="624" y="540" width="200" height="44" rx="8" fill="#fdecea" stroke="#e6a9a3"/>
  <text x="724" y="567" text-anchor="middle" class="small" font-weight="700">✉ Alerta de Falha</text>

  <line x1="214" y1="528" x2="252" y2="528" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="424" y1="528" x2="462" y2="528" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="584" y1="520" x2="622" y2="500" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="584" y1="536" x2="622" y2="560" stroke="#c62828" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="824" y1="497" x2="862" y2="497" stroke="#5b6470" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="592" y="494" class="badge">SIM</text>
  <text x="592" y="578" fill="#c62828" font-size="11" font-weight="700">NÃO</text>
</svg>
